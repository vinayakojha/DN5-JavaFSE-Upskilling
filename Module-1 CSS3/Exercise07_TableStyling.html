<!DOCTYPE html>
<html>

<head>

<style>

table{

width:80%;

border-collapse:collapse;

}

th,td{

border:1px solid black;

padding:10px;

text-align:center;

}

th{

background-color:lightblue;

}

tr:nth-child(even){

background-color:#f2f2f2;

}

</style>

</head>

<body>

<table>

<tr>

<th>Event</th>
<th>Date</th>

</tr>

<tr>

<td>Music</td>
<td>10 June</td>

</tr>

<tr>

<td>Sports</td>
<td>12 June</td>

</tr>

</table>

</body>
</html>
