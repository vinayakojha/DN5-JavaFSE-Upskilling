<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Registration Form</title>

<style>

body{
font-family:Arial;
padding:20px;
}

form{
width:400px;
padding:20px;
border:2px solid gray;
}

input,
select,
textarea{
width:100%;
margin-bottom:10px;
padding:8px;
}

</style>

<script>

function showMessage(event){

event.preventDefault();

document.getElementById("result").value =
"Registration Successful!";

}

</script>

</head>

<body>

<h2>Event Registration Form</h2>

<form onsubmit="showMessage(event)">

<input
type="text"
placeholder="Enter Name"
required
autofocus>

<input
type="email"
placeholder="Enter Email"
required>

<input
type="date"
required>

<select required>

<option value="">
Select Event
</option>

<option>
Music Event
</option>

<option>
Sports Event
</option>

<option>
Workshop
</option>

</select>

<textarea
placeholder="Enter Message">
</textarea>

<button type="submit">
Register
</button>

<br><br>

<output id="result"></output>

</form>

</body>

</html>
