<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Video Invite</title>

<script>

function videoReady(){

document.getElementById("message").innerHTML=
"Video Ready To Play";

}

window.onbeforeunload=function(){

return "Form is not completed. Are you sure you want to leave?";

};

</script>

</head>

<body>

<h2>Community Event Invitation</h2>

<video
width="500"
controls
oncanplay="videoReady()">

<source
src="https://www.w3schools.com/html/mov_bbb.mp4"
type="video/mp4">

</video>

<p id="message"></p>

</body>
</html>
